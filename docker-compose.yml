services:
  postgres:
    image: postgres:16
    container_name: ambev_postgres
    environment:
      POSTGRES_DB: ambev_sales
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ambev_postgres_data:/var/lib/postgresql/data

volumes:
  ambev_postgres_data: